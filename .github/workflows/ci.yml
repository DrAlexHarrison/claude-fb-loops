name: ci

on:
  push:
  pull_request:

env:
  USE_TF: "0"            # transformers' TF path breaks under Keras 3 (no tf-keras)
  USE_FLAX: "0"
  TOKENIZERS_PARALLELISM: "false"

jobs:
  # ---- privacy guard: no real personal data may ship --------------------------
  scrub-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Scrub-gate (no real home paths or other personal data in tracked files)
        run: python scripts/scrub_gate.py

  # ---- the three test suites --------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: scrub-gate
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # Cache the GLiNER ONNX + HF artifacts (~86 MB) so only the first run pays.
      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/gliner
          key: models-${{ runner.os }}-${{ hashFiles('fb-assist/fb_assist/redact.py') }}
          restore-keys: models-${{ runner.os }}-

      - name: Install packages (fb-assist first; fb-os/pps depend on it)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./fb-assist
          python -m pip install -e ./fb-os -e ./pps-pipeline
          python -m spacy download en_core_web_sm

      - name: Generate synthetic fixtures
        run: python fb-assist/tests/fixtures/generate_fixtures.py all

      - name: fb-assist suite
        run: cd fb-assist && python -m pytest -q

      - name: fb-os suite
        run: cd fb-os && python -m pytest -q

      - name: pps-pipeline suite
        run: cd pps-pipeline && python -m pytest -q

      - name: make demo (download-free smoke)
        run: make demo

  # ---- we scan ourselves with the same kind of tool the project ships ---------
  gitleaks:
    runs-on: ubuntu-latest
    needs: scrub-gate
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks repo scan (synthetic planted keys allow-listed in .gitleaks.toml)
        run: gitleaks detect --no-banner --redact -c .gitleaks.toml
